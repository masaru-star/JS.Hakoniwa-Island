        /* ご指定のタイルスタイル */

        .oilRig { background: linear-gradient(#66b3ff, #004b8d); }
        .plain { background-color: #dfffcc; }
        .waste { background-color: #bbbbbb; }
        .forest { background-color: #228B22; }
        .mountain { background: linear-gradient(#705335, #4b3621); }
        .farm { background-color: #b5e07a; }
        .house { background-color: #fff3c4; }
        .factory { background-color: #ccccff; }
        .gun { background-color: #666666; }
        .defenseFacility { background-color: #ff77aa; }
        .Monument { background-color: #d4c17d; }
        .warship { background: linear-gradient(#66b3ff, #4682B4); }
        .warship-dispatched { background-color: #002f5f; color: #fff; }
        .warship-wreckage { background-color: #333; color: #ccc; }

        /* グリッドコンテナとセルのホバー設定 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(16, minmax(0, 1fr));
            aspect-ratio: 1 / 1;
        }
        .map-cell {
            aspect-ratio: 1 / 1;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
        }
        .map-cell:hover {
            filter: brightness(1.2);
            transform: scale(1.08);
            z-index: 20;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* 建築時などのピカッと光り弾けるアニメーション */
        @keyframes tile-pop {
            0% { transform: scale(1); filter: brightness(1); }
            40% { transform: scale(1.25); filter: brightness(1.8) saturate(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .animate-build {
            animation: tile-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 30;
        }

        /* 文字送りアニメーション用のカーソル */
        @keyframes blink {
            50% { border-color: transparent }
        }
        .typing-cursor::after {
            content: '';
            border-right: 2px solid #3b82f6;
            animation: blink 0.7s step-end infinite;
            margin-left: 2px;
        }
    </style>
</head>

        // --- 3. アニメーション付き解説文字送り関数 (Typewriter Effect) ---
        function typeMessage(text, speed = 30) {
            const explainBox = document.getElementById('explain-box');
            
            if (typingTimeout) {
                clearTimeout(typingTimeout);
            }

            explainBox.innerText = '';
            let index = 0;

            function nextChar() {
                if (index < text.length) {
                    explainBox.innerText += text.charAt(index);
                    index++;
                    const randomDelay = speed + (Math.random() * 15 - 7);
                    typingTimeout = setTimeout(nextChar, Math.max(10, randomDelay));
                } else {
                    typingTimeout = null;
                }
            }
            nextChar();
        }

        // --- 4. 所定のタイルを小さなアニメーション付きで変更する関数 ---
        function updateTileWithAnim(r, c, newType) {
            const cell = document.querySelector(`.map-cell[data-row="${r}"][data-col="${c}"]`);
            if (!cell) return;

            // 1. マップデータ配列(現在の状態)を更新
            currentMapState[r][c] = newType;

            // 2. アニメーション演出クラスと枠線の適用
            cell.classList.remove('animate-build'); // 重複除去用のリセット
            void cell.offsetWidth; // リフローを起こしてアニメーションを再トリガー
            cell.classList.add('animate-build', 'ring-4', 'ring-amber-400');

            // 3. アニメーションの頂点あたりで見た目を切り替える (約 150ms 後)
            setTimeout(() => {
                // 古いクラスをすべて削除
                Object.keys(TILE_TYPES).forEach(key => {
                    cell.classList.remove(key);
                });
                
                // 新しいクラスを割り当て、データ属性を更新
                cell.classList.add(newType);
                cell.dataset.type = newType;
                
                // 絵文字テキストを割り当て
                cell.textContent = EMOJI_MAP[newType] || '';
            }, 150);

            // 4. アニメーション終了後に演出枠線を除外
            setTimeout(() => {
                cell.classList.remove('ring-4', 'ring-amber-400');
            }, 600);
        }

        // --- 5. マップの生成と描画 ---
        function initMapData(resetToDefault = true) {
            if (resetToDefault || currentMapState.length === 0) {
                // INITIAL_MAP をディープコピーして現在の状態とする
                currentMapState = JSON.parse(JSON.stringify(INITIAL_MAP));
            }
        }

        function generateMap() {
            const mapContainer = document.getElementById('game-map');
            mapContainer.innerHTML = '';

            for (let r = 0; r < 16; r++) {
                for (let c = 0; c < 16; c++) {
                    const tileType = currentMapState[r][c];
                    const cell = document.createElement('div');
                    
                    cell.className = `map-cell ${tileType} border border-slate-900/10 flex items-center justify-center text-xs sm:text-sm select-none`;
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.dataset.type = tileType;

                    // 初期絵文字挿入
                    cell.textContent = EMOJI_MAP[tileType] || '';

                    // ホバーイベント
                    cell.addEventListener('mouseenter', () => {
                        const currentType = cell.dataset.type;
                        const info = TILE_TYPES[currentType] || { name: '未知', desc: '詳細不明のエリア。' };
                        document.getElementById('hovered-tile-info').innerHTML = 
                            `座標: (${c}, ${r}) | <span class="text-white font-bold underline">${info.name}</span>`;
                    });

                    // クリックイベント (開発コマンドモードと観測モードの分岐)
                    cell.addEventListener('click', () => {
                        const currentType = cell.dataset.type;
                        
                        if (activeCommand === 'inspect') {
                            // 通常の観測モード
                            const info = TILE_TYPES[currentType] || { name: '未知', desc: '詳細不明のエリア。' };
                            const customMsg = `【${info.name}】座標 (${c}, ${r}): ${info.desc}`;
                            typeMessage(customMsg, 15);
                        } else {
                            // 開発テスト（コマンド配置）モード
                            // 海岸や海への配置制限など簡単なルールを持たせると雰囲気が出ます
                            if (activeCommand === 'oilRig' && currentType !== 'sea') {
                                typeMessage(`[システム警告] 海底油田 🛢️ は「海」のタイルにしか建設できません。`, 10);
                                return;
                            }
                            if (activeCommand !== 'oilRig' && currentType === 'sea') {
                                typeMessage(`[システム警告] 陸上施設は「海」のタイルには建設できません。埋め立てるか陸地を選んでください。`, 10);
                                return;
                            }

                            // アニメーション付きでタイルを更新！
                            updateTileWithAnim(r, c, activeCommand);
                            
                            const info = TILE_TYPES[activeCommand];
                            typeMessage(`[開発命令成功] 座標 (${c}, ${r}) を「${info.name}」へ開拓・設営しました！`, 15);
                        }
                    });

                    mapContainer.appendChild(cell);
                }
            }
        }

        // --- 6. 開発テストツール コマンドの切り替え ---
        function setBuildCommand(command) {
            activeCommand = command;
            
            // UIボタンのアクティブクラス切り替え
            const buttons = document.querySelectorAll('.cmd-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-blue-600', 'border-blue-400', 'text-white');
                btn.classList.add('bg-slate-750', 'hover:bg-slate-700', 'text-slate-300');
            });

            const activeBtn = document.getElementById(`cmd-${command}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-750', 'hover:bg-slate-700', 'text-slate-300');
                activeBtn.classList.add('bg-blue-600', 'border-blue-400', 'text-white');
            }

            // バッジの更新
            const badge = document.getElementById('active-mode-badge');
            if (command === 'inspect') {
                badge.innerText = "🔍 観測モード";
                badge.className = "text-xs bg-emerald-900/60 border border-emerald-700 text-emerald-300 px-2 py-1 rounded font-semibold";
            } else {
                const info = TILE_TYPES[command];
                badge.innerText = `🛠️ 設営: ${info.name}`;
                badge.className = "text-xs bg-amber-900/60 border border-amber-700 text-amber-300 px-2 py-1 rounded font-semibold animate-bounce";
            }
        }

        // --- 7. ステップ進行管理とアニメーションデモ実行 ---
        function changeStep(direction) {
            const targetStep = currentStep + direction;
            if (targetStep >= 0 && targetStep < TUTORIAL_STEPS.length) {
                currentStep = targetStep;
                updateStepUI(direction);
            }
        }

        function updateStepUI(direction = 0) {
            const step = TUTORIAL_STEPS[currentStep];
            
            // UIテキスト更新
            document.getElementById('step-title').innerText = step.title;
            document.getElementById('step-task').innerText = step.task;
            
            // 進捗バー更新
            const progressPercent = ((currentStep + 1) / TUTORIAL_STEPS.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            // ボタン活性化/非活性化
            document.getElementById('btn-prev').disabled = (currentStep === 0);
            document.getElementById('btn-next').innerHTML = (currentStep === TUTORIAL_STEPS.length - 1) ? "<span>最初からリセット</span> <span>🔄</span>" : "<span>次へ進む</span> <span>➔</span>";

            // 最後のステップで「次へ（最初からリセット）」を押したときの挙動
            if (currentStep === TUTORIAL_STEPS.length - 1) {
                document.getElementById('btn-next').onclick = () => {
                    currentStep = 0;
                    initMapData(true); // 完全初期リセット
                    generateMap();
                    updateStepUI();
                    setBuildCommand('inspect');
                };
            } else {
                document.getElementById('btn-next').onclick = () => changeStep(1);
            }

            // 解説エリアに文字送りアニメーション実行
            typeMessage(step.message, 25);

            // --- ステップごとの自動アニメーションデモ効果の実行 ---
            triggerStepDemo(currentStep, direction);
        }

        // ステップ遷移時に、自動で該当タイルがピカピカ変化して見せるデモ
        function triggerStepDemo(stepIdx, direction) {
            // 「戻る」で遷移した場合は、そこまでのステップに合うようにマップ状態を初期から再構成する

                // 各ステップに応じた確定分を裏で適用
                if (stepIdx >= 1) {

                    currentMapState[6][9] = 'factory';
                    currentMapState[13][11] = 'oilRig';
                }
                if (stepIdx >= 2) {

                    currentMapState[5][10] = 'house';

                setTimeout(() => updateTileWithAnim(6, 9, 'factory'), 1000);
                setTimeout(() => updateTileWithAnim(13, 11, 'oilRig'), 1600);
            } 
            else if (stepIdx === 2) {
                // 平地 -> 住宅へ
                setTimeout(() => updateTileWithAnim(5, 8, 'house'), 500);

            else if (stepIdx === 3) {
